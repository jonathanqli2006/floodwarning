<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flood Risk Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <div class="panel__header">
          <div class="title">Flood Risk</div>
          <div class="subtitle">Select a date to view risk</div>
        </div>

        <div class="panel__section">
          <label class="label" for="dateInput">Date</label>
          <input id="dateInput" class="date" type="date" />
          <div id="dateHelp" class="help"></div>
        </div>

        <div class="panel__section">
          <div class="label">Legend</div>
          <div id="legend" class="legend"></div>
        </div>

        <div class="panel__section">
          <div class="label">Status</div>
          <div id="status" class="status">Loading…</div>
        </div>

        <div class="panel__footer">
          <div class="muted">
            Basemap © OpenStreetMap contributors. Overlay GeoTIFF rasters in
            <code>data/</code> (one <code>.tif</code> per date).
          </div>
        </div>
      </aside>

      <main class="mapWrap">
        <div id="map" class="map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
