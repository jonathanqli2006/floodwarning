<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloodTrace — SAR Flood Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">

      <aside class="sidebar">
        <div class="sidebar-inner">

          <div class="sidebar-header">
            <div class="wordmark">
              <span class="wordmark-flood">Flood</span><span class="wordmark-trace">Trace</span>
            </div>
            <div class="tagline">SAR Flood Monitoring</div>
          </div>

          <!-- Calendar -->
          <section class="sidebar-section">
            <div class="section-label">ACQUISITION DATE</div>
            <div class="cal-nav">
              <button class="cal-nav-btn" id="calPrev">&#8249;</button>
              <div class="cal-month-label" id="calMonthLabel"></div>
              <button class="cal-nav-btn" id="calNext">&#8250;</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-selected" id="calSelected">No date selected</div>
          </section>

          <!-- Legend -->
          <section class="sidebar-section">
            <div class="section-label">CLASSIFICATION</div>
            <div id="legend" class="legend"></div>
          </section>

          <!-- Status -->
          <section class="sidebar-section">
            <div class="section-label">STATUS</div>
            <div id="status" class="status-text">Initializing…</div>
          </section>

          <div class="sidebar-footer">
            <div class="footer-line">Sentinel-1 SAR · SIENA Model</div>
            <div class="footer-line">© OpenStreetMap · CARTO</div>
          </div>

        </div>
      </aside>

      <main class="map-wrap">
        <div id="map"></div>
        <div class="scale-bar">
          <div class="scale-bar-line" id="scaleBarLine"></div>
          <div class="scale-bar-label" id="scaleBarLabel"></div>
        </div>
      </main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
